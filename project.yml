name: openOwl
options:
  bundleIdPrefix: com.openowl
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  CodeEditSourceEditor:
    url: https://github.com/CodeEditApp/CodeEditSourceEditor
    from: "0.15.2"

settings:
  base:
    SWIFT_OBJC_BRIDGING_HEADER: openOwl/Ghostty/openOwl-Bridging-Header.h
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "5.10"
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: C3NL524YS6
    ENABLE_HARDENED_RUNTIME: YES

targets:
  openOwl:
    type: application
    platform: macOS
    sources:
      - path: openOwl
        excludes:
          - "**/*.entitlements"
      - path: ghostty-resources
        type: folder
        buildPhase: resources
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.openowl.app
        PRODUCT_NAME: openOwl
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: "3"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: openOwl/Resources/Info.plist
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_CFBundleDisplayName: OpenOwl
        CODE_SIGN_ENTITLEMENTS: openOwl/Resources/openOwl.entitlements
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/GhosttyKit.xcframework/macos-arm64_x86_64/Headers"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/GhosttyKit.xcframework/macos-arm64_x86_64"
        OTHER_LDFLAGS:
          - "-lghostty"
          - "-framework Metal"
          - "-framework MetalKit"
          - "-framework AppKit"
          - "-framework QuartzCore"
          - "-framework CoreText"
          - "-framework CoreGraphics"
          - "-framework Foundation"
          - "-framework Carbon"
          - "-framework IOKit"
          - "-framework UniformTypeIdentifiers"
          - "-framework Security"
          - "-lz"
          - "-lc++"
      configs:
        Debug:
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIconDev
        Release:
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: CodeEditSourceEditor
        product: CodeEditSourceEditor
    entitlements:
      path: openOwl/Resources/openOwl.entitlements
      properties:
        com.apple.security.cs.allow-jit: true
        com.apple.security.cs.allow-unsigned-executable-memory: true
        com.apple.security.cs.disable-library-validation: true

  openOwlTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: openOwlTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openowl.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.10"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/openOwl.app/Contents/MacOS/openOwl"
        BUNDLE_LOADER: "$(TEST_HOST)"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/GhosttyKit.xcframework/macos-arm64_x86_64/Headers"
    dependencies:
      - target: openOwl

schemes:
  openOwl:
    build:
      targets:
        openOwl: all
        openOwlTests: [test]
    test:
      targets:
        - openOwlTests
